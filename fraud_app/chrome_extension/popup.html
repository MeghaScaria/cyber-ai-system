<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Fraud AI Shield</title>

  <!-- 📱 RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🎨 STYLES -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- 🌌 BACKGROUND -->
  <canvas id="bgCanvas"></canvas>

  <div class="container">

    <!-- 🔥 TITLE -->
    <h2 class="title">Fraud AI Shield</h2>

    <!-- 🔘 URL SCAN BUTTON -->
    <button id="checkBtn" class="scan-btn">
      🔍 Scan Website
    </button>

    <!-- 🔄 LOADER -->
    <div id="loader" class="loader hidden"></div>

    <!-- 📊 RESULT -->
    <div id="resultBox" class="result">

      <!-- 🎯 SCORE METER -->
      <canvas id="scoreCanvas" width="120" height="120"></canvas>

      <!-- 🔐 STATUS -->
      <p id="status" class="status">
        Click scan to analyze the website
      </p>

      <!-- 💎 QUOTE CARD -->
      <div class="quote-glass">
        <p id="quote" class="quote">
          Your AI shield is ready 🛡️
        </p>
        <span id="refreshQuote" class="refresh" title="Refresh quote">🔄</span>
      </div>

      <!-- 📈 SCORE -->
      <p id="scoreText" class="score">
        Risk Score: --%
      </p>

      <!-- 🚨 EXPLANATION -->
      <p id="explanationText" class="explanation"></p>

      <!-- 📌 REASONS -->
      <ul id="reasonsList" class="reasons"></ul>

    </div>

    <!-- 📩 SMS ANALYZER -->
    <div class="sms-box">

      <textarea id="smsInput" placeholder="Paste SMS message here..."></textarea>

      <button id="smsBtn" class="scan-btn">
        📩 Analyze SMS
      </button>

      <p id="smsStatus" class="status"></p>
      <p id="smsScore" class="score"></p>

    </div>

    <!-- 📊 HISTORY BUTTON -->
    <button id="openHistory" class="history-btn">
      📊 View History
    </button>

  </div>

  <!-- 🚀 SCRIPT -->
  <script src="popup.js"></script>

</body>
</html>
