<!DOCTYPE html>
<html>
<head>
  <title>Scan History - Fraud AI Shield</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .item {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      background: #1a1a1a;
      border-left: 4px solid #444;
    }

    .url {
      font-size: 13px;
      word-break: break-all;
      margin-bottom: 5px;
    }

    .meta {
      font-size: 12px;
      opacity: 0.8;
    }

    .safe {
      border-left-color: #00ff99;
      color: #00ff99;
    }

    .suspicious {
      border-left-color: #ffd93d;
      color: #ffd93d;
    }

    .fraud {
      border-left-color: #ff4d4d;
      color: #ff4d4d;
    }

    .empty {
      text-align: center;
      opacity: 0.6;
      margin-top: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      background: #ff4d4d;
      border: none;
      padding: 6px 10px;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }

    .clear-btn:hover {
      background: #ff1a1a;
    }

  </style>
</head>

<body>

  <div class="header">
    <h2>📊 Scan History</h2>
    <button id="clearHistory" class="clear-btn">Clear</button>
  </div>

  <div id="historyList"></div>

  <p id="emptyState" class="empty">No scans yet.</p>

  <script src="history.js"></script>

</body>
</html>
