name: fraud_ai_shield_app
description: "AI-powered Fraud Detection App with Realtime Analytics and Premium UI"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🌐 API
  http: ^1.6.0

  # 🔥 Firebase
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

  # 📊 Charts
  fl_chart: ^0.68.0

  # 💾 Local storage
  shared_preferences: ^2.2.2

  # 🔄 WebSocket
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 🚀 App Icon Generator
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # 🔥 Enable ONLY if folder exists
  assets:
    - assets/icon.png

  # Optional fonts (enable later if needed)
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700

# 🚀 ICON CONFIG (IMPORTANT)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"